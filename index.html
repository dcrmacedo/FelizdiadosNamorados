<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Feliz Dia dos Namorados</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', cursive;
      background: #ffd6e7;
      overflow-x: hidden;
    }

    .hearts {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      transform: rotate(45deg);
      animation: float 10s linear infinite;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }

    .heart::before {
      top: -10px;
      left: 0;
    }

    .heart::after {
      left: -10px;
      top: 0;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(45deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) rotate(45deg);
        opacity: 0;
      }
    }

    header {
      text-align: center;
      padding: 2rem 1rem;
      color: #b30059;
      font-size: 2rem;
      font-weight: bold;
    }

    @media (min-width: 768px) {
      header {
        font-size: 2.5rem;
      }
    }

    .slideshow {
      width: 100%;
      max-width: 600px;
      margin: auto;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .slides {
      display: flex;
      width: 800%;
      animation: slide 80s ease-in-out infinite;
    }

    .slides img,
    .slides video {
      width: 100vw;
      height: auto;
      flex-shrink: 0;
      object-fit: cover;
      transition: opacity 1s ease-in-out;
    }

    @media (min-width: 600px) {
      .slides img,
      .slides video {
        width: 600px;
      }
    }

    @keyframes slide {
      0% { transform: translateX(0%); }
      12.5% { transform: translateX(-100%); }
      25% { transform: translateX(-200%); }
      37.5% { transform: translateX(-300%); }
      50% { transform: translateX(-400%); }
      62.5% { transform: translateX(-500%); }
      75% { transform: translateX(-600%); }
      87.5% { transform: translateX(-700%); }
      100% { transform: translateX(0%); }
    }

    .btn {
      display: block;
      margin: 2rem auto;
      padding: 1rem 2rem;
      font-size: 1.2rem;
      background-color: #ff66a3;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.3s;
      width: 80%;
      max-width: 300px;
    }

    .btn:hover {
      background-color: #e60073;
    }

    .final-message {
      text-align: center;
      margin-top: 3rem;
      font-size: 1.8rem;
      color: #b30059;
      font-weight: bold;
    }

    .final-message .sub {
      display: block;
      font-size: 1.2rem;
      margin-top: 0.5rem;
      color: #800040;
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <header>
    Feliz Dia dos Namorados ❤️
  </header>

  <div class="slideshow">
    <div class="slides">
      <img src="./pasta/raissa01.jpeg" alt="Foto 1">
      <img src="./pasta/raissa02.jpeg" alt="Foto 2">
      <img src="./pasta/raissa03.jpeg" alt="Foto 3">
      <video src="./pasta/video01.mp4" autoplay muted loop></video>
      <img src="./pasta/nos.jpeg" alt="Foto 4">
      <img src="./pasta/raissa04.jpeg" alt="Foto 4">
      <img src="./pasta/raissa05.jpeg" alt="Foto 5">
      <img src="./pasta/juntos.webp" alt="Foto 6">
      <video src="./pasta/video.mp4" autoplay muted loop></video>
    </div>
  </div>

  <div class="final-message">
    Feliz Dia dos Namorados<br>
    <span class="sub">Juntos para sempre</span>
  </div>

  <button class="btn">Nossa História</button>

  <!-- Música de fundo (você pode alterar o src como desejar) -->
  <audio id="bg-music" src="./pasta/exagerado.mp3" autoplay loop></audio>

  <script>
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (5 + Math.random() * 5) + 's';
      document.getElementById('hearts').appendChild(heart);

      setTimeout(() => heart.remove(), 10000);
    }

    setInterval(createHeart, 300);
  </script>
</body>
</html>
